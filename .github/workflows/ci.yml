name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FAILPROOFAI_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: bun install --frozen-lockfile

      - name: Check version consistency
        run: |
          ROOT_VERSION=$(jq -r .version package.json)
          echo "Root version: $ROOT_VERSION"
          echo "Version check passed"

      - name: Lint
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: bun run lint

      - name: Type check
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: bunx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env-config:
          - { name: default,       env: {} }
          - { name: log-debug,     env: { FAILPROOFAI_LOG_LEVEL: debug } }
          - { name: hook-log-file, env: { FAILPROOFAI_HOOK_LOG_FILE: "1" } }
    env:
      FAILPROOFAI_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: bun install --frozen-lockfile

      - name: Test (${{ matrix.env-config.name }})
        uses: nick-fields/retry@v4
        env: ${{ matrix.env-config.env }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: bun run test:run

  build:
    runs-on: ubuntu-latest
    env:
      FAILPROOFAI_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: bun install --frozen-lockfile

      - name: Build
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: bun run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Validate docs
        working-directory: docs
        run: mintlify validate

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit --audit-level moderate || true

  test-e2e:
    runs-on: ubuntu-latest
    env:
      FAILPROOFAI_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: bun install --frozen-lockfile

      - name: Build E2E fixtures
        run: bun build src/index.ts --outdir dist --target node --format cjs

      - name: E2E Hook Tests
        uses: nick-fields/retry@v4
        with:
          max_attempts: 2
          timeout_minutes: 10
          command: bun run test:e2e
